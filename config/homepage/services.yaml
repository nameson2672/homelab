- Network:
    - Traefik:
        icon: traefik.png
        href: https://traefik.homelab
        description: Reverse Proxy
        widget:
          type: traefik
          url: http://traefik:8080

    - Pi-hole:
        icon: pi-hole.png
        href: https://pihole.homelab
        description: Ad Blocking & DNS
        widget:
          type: pihole
          url: http://pihole:80
          key: {{HOMEPAGE_VAR_PIHOLE_API_KEY}}

- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.homelab
        description: Movies & TV
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}

    - Audiobookshelf:
        icon: audiobookshelf.png
        href: https://audiobookshelf.homelab
        description: Audiobooks

    - Kavita:
        icon: kavita.png
        href: https://kavita.homelab
        description: Books & Comics

- Downloads:
    - qBittorrent:
        icon: qbittorrent.png
        href: https://qbittorrent.homelab
        description: Torrent Downloader
        widget:
          type: qbittorrent
          url: http://qbittorrent:8080
          username: admin
          password: {{HOMEPAGE_VAR_QBIT_PASSWORD}}

    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.homelab
        description: Indexer Manager
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}

    - FlareSolverr:
        icon: flaresolverr.png
        href: http://192.168.2.17:8191
        description: Cloudflare Bypass

- Automation:
    - Radarr:
        icon: radarr.png
        href: https://radarr.homelab
        description: Movie Automation
        widget:
          type: radarr
          url: http://radarr:7878
          key: {{HOMEPAGE_VAR_RADARR_API_KEY}}

    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.homelab
        description: TV Show Automation
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: {{HOMEPAGE_VAR_SONARR_API_KEY}}

    - LazyLibrarian:
        icon: lazylibrarian.png
        href: https://lazylibrarian.homelab
        description: Book & Audiobook Automation
